{% extends "base.html" %}
{% block title %}Register — Local RAG{% endblock %}

{% block layout %}
<div class="auth-shell">
  <div class="auth-card">
    <div class="auth-brand">
      <div class="brand-logo brand-logo-lg" style="margin:0 auto 20px;">
        <svg viewBox="0 0 24 24" width="30" height="30" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/>
          <polyline points="3.27 6.96 12 12.01 20.73 6.96"/>
          <line x1="12" y1="22.08" x2="12" y2="12"/>
        </svg>
      </div>
      <h1>Buat Akun Baru</h1>
      <p class="muted">Daftarkan akun untuk mulai menggunakan sistem RAG.</p>
    </div>

    <form id="registerForm" class="form" autocomplete="off">
      <div class="form-group">
        <label for="username">Username</label>
        <div class="input-with-icon">
          <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
          <input type="text" id="username" name="username" required minlength="3" autofocus placeholder="minimum 3 karakter">
        </div>
      </div>
      <div class="form-group">
        <label for="email">
          Email
          <span class="muted small" style="font-weight:400;"> — opsional</span>
        </label>
        <div class="input-with-icon">
          <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
          <input type="email" id="email" name="email" placeholder="email@example.com">
        </div>
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <div class="input-with-icon">
          <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
          <input type="password" id="password" name="password" required minlength="6" placeholder="minimum 6 karakter">
        </div>
      </div>
      <button type="submit" class="btn btn-primary btn-block btn-pill" id="registerBtn" style="margin-top:4px;padding:13px;">
        Buat Akun
      </button>
      <p class="muted small center" style="margin-top:4px;">
        Sudah punya akun? <a href="/login">Login sekarang</a>
      </p>
    </form>
    <div id="registerError" class="alert alert-error hidden" style="margin-top:14px;background:rgba(239,68,68,0.12);border-color:rgba(239,68,68,0.25);color:#fca5a5;"></div>
    <div id="registerOk" class="alert alert-ok hidden" style="margin-top:14px;background:rgba(34,197,94,0.12);border-color:rgba(34,197,94,0.25);color:#86efac;"></div>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script>
document.addEventListener('DOMContentLoaded', () => {
  if (Auth.getToken()) { window.location.href = '/'; return; }
  const form = document.getElementById('registerForm');
  const errBox = document.getElementById('registerError');
  const okBox = document.getElementById('registerOk');
  const btn = document.getElementById('registerBtn');
  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    errBox.classList.add('hidden');
    okBox.classList.add('hidden');
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span> Memproses...';
    try {
      await API.post('/auth/register', {
        username: document.getElementById('username').value.trim(),
        email: document.getElementById('email').value.trim() || null,
        password: document.getElementById('password').value
      }, false);
      okBox.textContent = 'Registrasi berhasil! Mengarahkan ke halaman login...';
      okBox.classList.remove('hidden');
      setTimeout(() => window.location.href = '/login', 1200);
    } catch (err) {
      errBox.textContent = err.message || 'Registrasi gagal';
      errBox.classList.remove('hidden');
      btn.disabled = false;
      btn.textContent = 'Buat Akun';
    }
  });
});
</script>
{% endblock %}
