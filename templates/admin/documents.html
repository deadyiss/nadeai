{% extends "base.html" %}
{% block title %}Documents — Admin{% endblock %}

{% block content %}
<header class="page-header">
  <div>
    <h1>Semua Dokumen</h1>
    <p class="page-subtitle">Lihat seluruh dokumen yang terindex di sistem.</p>
  </div>
  <button class="btn btn-ghost" id="btnRefreshDocs">
    <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg>
    <span>Refresh</span>
  </button>
</header>

<div class="panel">
  <div class="table-wrap">
    <table class="data-table">
      <thead>
        <tr>
          <th>ID</th>
          <th>Filename</th>
          <th>Owner</th>
          <th>Kata</th>
          <th>Visibility</th>
          <th>Dibuat</th>
          <th class="action-col">Aksi</th>
        </tr>
      </thead>
      <tbody id="docTableBody">
        <tr><td colspan="7" class="muted center">Loading...</td></tr>
      </tbody>
    </table>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script src="{{ url_for('static', filename='js/admin.js') }}"></script>
<script>
document.addEventListener('DOMContentLoaded', () => {
  AdminAuth.requireAdmin();
  Admin.loadAllDocuments();
  document.getElementById('btnRefreshDocs').addEventListener('click', Admin.loadAllDocuments);
});
</script>
{% endblock %}
