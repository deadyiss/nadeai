name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    strategy:
      matrix:
        python-version: ['3.10', '3.11', '3.12']

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install -r requirements-dev.txt

    - name: Lint with flake8
      continue-on-error: true
      run: |
        # Stop the build if there are Python syntax errors or undefined names
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
        # Exit-zero treats all errors as warnings
        flake8 . --count --exit-zero --max-complexity=10 --max-line-length=120 --statistics --ignore=E501,W503

    - name: Check code formatting with black
      continue-on-error: true
      run: |
        black --check . --exclude venv || black . --exclude venv

    - name: Check import sorting with isort
      continue-on-error: true
      run: |
        isort . --check-only --profile black --skip venv || isort . --profile black --skip venv

    - name: Run pytest with coverage
      run: |
        pytest tests/ --cov=. --cov-report=xml --cov-report=html --cov-report=term-missing --tb=short

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v3
      with:
        file: ./coverage.xml
        flags: unittests
        name: codecov-umbrella
        fail_ci_if_error: false

    - name: Archive test results
      if: always()
      uses: actions/upload-artifact@v3
      with:
        name: coverage-report-py${{ matrix.python-version }}
        path: htmlcov/

  security:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install bandit safety

    - name: Run bandit for security check
      continue-on-error: true
      run: |
        bandit -r . -f json -o bandit-report.json || true
        bandit -r . -f txt

    - name: Check known security vulnerabilities
      continue-on-error: true
      run: |
        safety check --json || true

  build:
    needs: [test, security]
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Verify imports and modules
      run: |
        python -c "import config; print('✓ Config loaded')"
        python -c "from core import llm_engine; print('✓ LLM Engine loaded')"
        python -c "from core import hallucination_checker; print('✓ Hallucination Checker loaded')"
        python -c "from models.database import init_db; print('✓ Database models loaded')"

    - name: Check application bootstrap
      timeout-minutes: 5
      run: |
        python -c "from app import create_app; app = create_app(); print('✓ Flask app created successfully')"

  notify:
    needs: [test, security, build]
    runs-on: ubuntu-latest
    if: always()

    steps:
    - name: Check job status
      run: |
        if [ "${{ needs.test.result }}" == "failure" ] || [ "${{ needs.security.result }}" == "failure" ] || [ "${{ needs.build.result }}" == "failure" ]; then
          echo "❌ CI Pipeline failed"
          exit 1
        else
          echo "✅ CI Pipeline passed"
        fi
